name: Deploy Expo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        working-directory: ./SavConnect_Expo-main/frontend
        run: npm install

      - name: Build for Web
        working-directory: ./SavConnect_Expo-main/frontend
        run: npx expo export -p web
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.RENDER_API_URL }}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./SavConnect_Expo-main/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
